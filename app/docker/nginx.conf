server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # En-têtes de sécurité de base.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Tout est servi en same-origin (SPA, API, polices embarquées) : CSP stricte.
    # 'unsafe-inline' limité aux styles : bindings :style de Vue.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # API : même origine, pas de CORS à ouvrir.
    location /api {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # SPA : toute route inconnue retombe sur index.html (history mode).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long sur les assets fingerprintés par Vite.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
