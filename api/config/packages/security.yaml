security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # La direction hérite des droits manager, le manager de ceux de l'utilisateur.
    # Permet un simple #[IsGranted('ROLE_MANAGER')] côté contrôleur.
    role_hierarchy:
        ROLE_ADMIN: [ROLE_MANAGER, ROLE_USER]
        ROLE_MANAGER: [ROLE_USER]

    providers:
        app_users:
            entity:
                class: App\Module\Core\Entity\User
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_users
            entry_point: App\Module\Core\Security\JsonAuthenticationEntryPoint
            json_login:
                check_path: api_login
                username_path: email
                password_path: password
            # Anti brute-force : 5 tentatives par identifiant+IP, compteur remis à zéro
            # à chaque connexion réussie.
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            logout:
                path: api_logout

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        # Le journal d'audit expose IP et activité des collaborateurs : direction uniquement.
        - { path: ^/api/audit, roles: ROLE_ADMIN }
        # CRA : saisie back-office pour le compte des consultants → managers/direction
        # uniquement (lecture comprise, pour éviter l'énumération). Le self-service
        # viendra avec un lien User↔Consultant.
        - { path: ^/api/cra, roles: [ROLE_MANAGER, ROLE_ADMIN] }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
